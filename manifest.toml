#:schema https://raw.githubusercontent.com/YunoHost/apps/main/schemas/manifest.v2.schema.json

packaging_format = 2
id = "owlrelay"
name = "OwlRelay"
description.en = "Email to Webhook service."
description.fr = "Email to Webhook service." 
version = "0.0.3~ynh1"

maintainers = ["otm33GH"]

[upstream]
license = "GPL-3.0-only" # you can see the available licenses identifiers list here: https://spdx.org/licenses/
website = "https://owlrelay.email/"
admindoc = "https://docs.papra.app/"
code = "https://github.com/papra-hq/owlrelay"


[integration]
yunohost = ">= 12.1.39"
helpers_version = "2.1"
# FIXME: can be replaced by a list of supported archs using the dpkg --print-architecture nomenclature (amd64/i386/armhf/arm64), for example: ["amd64", "i386"]
architectures = "all"
multi_instance = false


ldap = false
sso = false

# FIXME: replace with an **estimate** minimum disk and RAM requirements. e.g. 20M, 400M, 1G...
disk = "50M"
ram.build = "50M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources]

    [resources.sources.main]
    url = "https://github.com/papra-hq/owlrelay/archive/refs/tags/v0.0.3.tar.gz"
    sha256 = "1e8e5c7c57098713e5a6550a3242d18341166dabc9dad62eae44f374bf9d64db"
    # autoupdate.strategy = "latest_github_tag"

    [resources.system_user]
	allow_email = true
    
    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]

    main.url = "/"

    [resources.ports]

    
    [resources.apt]
    [resources.nodejs]
    version = "24"
  
